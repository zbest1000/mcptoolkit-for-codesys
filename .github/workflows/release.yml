name: release

# Publishes a GitHub Release with the built wheel + sdist when a version tag is
# pushed. See RELEASING.md for the full process.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # required to create the release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Test (gate the release on green host tests)
        run: pytest -q

      - name: Verify tag matches package version
        # Guards against tagging vX.Y.Z while pyproject still says something else.
        run: |
          PKG=$(python -c "import importlib.metadata as m; print(m.version('mcptoolkit-for-codesys'))")
          TAG="${GITHUB_REF_NAME#v}"
          echo "tag=$TAG  package=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match pyproject version $PKG"
            exit 1
          fi

      - name: Build wheel + sdist
        run: python -m build

      - name: Validate distributions
        run: twine check dist/*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
