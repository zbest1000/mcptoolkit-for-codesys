name: tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  pytest:
    name: pytest (python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # We target 3.11+ at runtime; test the LTS-style range.
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run host-side tests
        # Watcher-side code is IronPython 2.7 and can't run in CI; only the
        # CPython 3 host code (mcptoolkit_for_codesys/) is exercised here.
        run: pytest -v --tb=short

      - name: Syntax-check watcher scripts (IronPython-targeted, parsed by CPython AST)
        # Catches obvious syntax errors in scripts/ even though we can't
        # *run* them. IronPython 2.7 syntax is mostly Python-3 valid.
        run: |
          python -c "
          import ast, pathlib, sys
          failed = []
          for p in pathlib.Path('scripts').rglob('*.py'):
              try:
                  ast.parse(p.read_text(encoding='utf-8'))
              except SyntaxError as e:
                  failed.append(f'{p}: {e}')
          if failed:
              print('\n'.join(failed)); sys.exit(1)
          print(f'OK: parsed {len(list(pathlib.Path(\"scripts\").rglob(\"*.py\")))} watcher files')
          "
